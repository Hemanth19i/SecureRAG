# Production SPA server for SecureRAG (Docker).
#
# The built SPA calls the backend at the relative path /api/* (same-origin, so
# the browser never makes a cross-origin request and the backend's CORS config
# is never exercised — identical to the Vite dev proxy). nginx terminates those
# calls and reverse-proxies them to the backend container.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Logs can be large; allow uploads up to the backend's MAX_UPLOAD_MB (50).
    client_max_body_size 50m;

    # Reverse-proxy API traffic to the backend container. The trailing slash on
    # proxy_pass strips the /api prefix, mirroring the Vite dev proxy rewrite, so
    # /api/auth/login -> https://securerag-production.up.railway.app/auth/login (Flask mounts at root).
    # "backend" is the Docker Compose service name, resolved on the compose network.
    location /api/ {
        proxy_pass https://securerag-production.up.railway.app/;
        proxy_ssl_server_name on;
        proxy_ssl_name securerag-production.up.railway.app;
        proxy_set_header Host securerag-production.up.railway.app;
        proxy_http_version 1.1;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # SPA: serve static assets, falling back to index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
