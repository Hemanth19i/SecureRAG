name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            server/requirements.txt
            server/requirements-dev.txt

      - name: Install dependencies
        working-directory: server
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (ruff)
        working-directory: server
        run: ruff check .

      - name: Security scan (bandit)
        working-directory: server
        run: bandit -r api intelligence rag eval app.py run_production.py wsgi.py --severity-level medium

      - name: Dependency audit (pip-audit)
        working-directory: server
        # Ignored CVEs are unreachable in our usage; see SECURITY.md risk register.
        run: pip-audit -r requirements.txt --ignore-vuln CVE-2026-45829 --ignore-vuln PYSEC-2025-217 --ignore-vuln CVE-2026-1839

      - name: Test (pytest, excluding integration) + coverage
        working-directory: server
        run: pytest -m "not integration" --cov=intelligence --cov=api --cov-report=term-missing
